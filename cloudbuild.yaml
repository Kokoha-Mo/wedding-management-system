steps:
  # 【步驟 A】從 GCS 抓取 Maven 快取
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil cp gs://${_CACHE_BUCKET}/maven-cache.tar.gz maven-cache.tar.gz || exit 0
        tar -xzf maven-cache.tar.gz || exit 0

  # 【步驟 B】Maven 編譯 (保持 clean 以免舊程式碼殘留)
  - name: 'gcr.io/cloud-builders/mvn'
    args: ['clean', 'install', '-Dmaven.repo.local=./.m2/repository', '-DskipTests']

  # 【步驟 C】非同步上傳快取 (不阻塞後續步驟)
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        tar -czf maven-cache.tar.gz ./.m2/repository
        gsutil cp maven-cache.tar.gz gs://${_CACHE_BUCKET}/maven-cache.tar.gz

  # 【步驟 D】Docker Build (加入快取機制)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # 先拉取上一次的 latest image 作為快取基準
        docker pull asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wedding-management-system:latest || exit 0
        docker build \
          --cache-from asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wedding-management-system:latest \
          -t asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wedding-management-system:$COMMIT_SHA \
          -t asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wedding-management-system:latest .

  # 【步驟 E】推送鏡像 (一次推兩個 tag)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wedding-management-system', '--all-tags']

 # 【步驟 F】部署到 Cloud Run (動態指定服務名稱)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'  # 使用自訂變數，不要寫死名稱
      - '--image'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wedding-management-system:$COMMIT_SHA'
      - '--region'
      - 'asia-east1'

# 設定更高規格的機器，大幅縮短整體時間
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

images:
  - 'asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wedding-management-system:$COMMIT_SHA'