spring.application.name=wedding-management-system

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 資料庫連線設定 (使用環境變數，並提供預設值作為備援)
# 修正後的寫法：將帳密獨立出來，不要塞在 URL 裡面
spring.datasource.url=jdbc:mysql:///${DB_URL}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update

spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# 檔案上傳設定
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# GCP Storage 設定
gcp.bucket.name=es-wedding-bucket-123
gcp.project.id=project-14259b03-dcea-4822-a79
# 告訴 DevTools 不要因為 uploads 資料夾內的檔案變更而重新啟動/刷新
spring.devtools.restart.exclude=static/uploads/**,public/uploads/**,uploads/**

# Gmail SMTP 設定
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.base.url=${APP_BASE_URL:http://localhost:8080}

# ... 原有的設定 ...

# JWT 安全設定
# 這裡定義一個屬性，對應環境變數 JWT_SECRET
app.jwt.secret=${JWT_SECRET:default_secret_key_for_local_dev_only_123456}
