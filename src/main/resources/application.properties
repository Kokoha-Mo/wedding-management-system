spring.application.name=wedding-management-system

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 資料庫連線設定 (使用環境變數，並提供預設值作為備援)
spring.datasource.url=spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:3306/wedding_management_system?serverTimezone=Asia/Taipei&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.password=${DB_PASS:your_local_password}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update

spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# 檔案上傳設定
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# 告訴 DevTools 不要因為 uploads 資料夾內的檔案變更而重新啟動/刷新
spring.devtools.restart.exclude=static/uploads/**,public/uploads/**,uploads/**

